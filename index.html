<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Anniversary 1st Year of Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8fa3;
            --secondary: #ffb3c1;
            --accent: #fb6f92;
        }

        body {
            font-family: 'Mali', cursive;
            background-color: #fff5f7;
            background-image:
                radial-gradient(#ffcad4 1.2px, transparent 1.2px);
            background-size: 20px 20px;
            overflow: hidden;
            touch-action: none;
        }

        /* กรอบเครื่องเล่นเกม */
        .game-console {
            background: #ffffff;
            border: 8px solid #ffffff;
            border-radius: 4rem;
            box-shadow:
                0 25px 50px -12px rgba(251, 111, 146, 0.4),
                inset 0 -8px 0 #fecdd3;
            position: relative;
        }

        canvas {
            display: block;
            border-radius: 3.2rem;
            background: #ffffff;
        }

        /* ปุ่มควบคุมแบบ SVG - ปรับปรุงใหม่ */
        .control-btn {
            background: #ffffff;
            border-radius: 1.5rem;
            width: 62px;
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #ffb3c1;
            transition: all 0.1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding: 14px;
            border: 1px solid #ffe4e6;
        }

        .control-btn svg {
            width: 100%;
            height: 100%;
            fill: #fb6f92;
            display: block;
        }

        .control-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #ffb3c1;
            background-color: #fff9fa;
        }

        /* หน้าต่างแจ้งเตือน */
        .modal-overlay {
            background: rgba(255, 175, 190, 0.3);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .popup {
            background: white;
            border-radius: 3rem;
            width: 100%;
            max-width: 320px;
            padding: 1.5rem;
            text-align: center;
            border: 4px solid #ffffff;
            box-shadow: 0 20px 40px rgba(251, 111, 146, 0.2);
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .popup {
            transform: scale(1);
            opacity: 1;
        }

        .puffy-button {
            background: linear-gradient(180deg, #ffb3c1, #fb6f92);
            color: white;
            border-radius: 1.8rem;
            padding: 1.1rem;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 6px 15px rgba(251, 111, 146, 0.3);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        .heart-icon {
            animation: heartBeat 1.5s infinite;
        }

        @keyframes heartBeat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }
    </style>
</head>

<body class="flex flex-col items-center justify-between min-h-screen p-4 py-8">

    <audio id="bgm" loop muted>
        <source src="share.mp3" type="audio/mpeg">
    </audio>

    <!-- Header -->
    <div class="text-center">
        <h1 class="text-3xl font-bold text-[#fb6f92] flex items-center justify-center gap-2">
            Our Journey <span class="heart-icon">💝</span>
        </h1>
        <p id="status" class="text-[#ff8fa3] text-sm mt-1 font-bold">บี๋ลองเล่นเกมที่เค้าทำดูนะคั้บบ</p>
    </div>

    <!-- Game Console Screen -->
    <div class="game-console w-full max-w-[340px]">
        <canvas id="gameCanvas" width="340" height="360"></canvas>
    </div>

    <!-- Directional Controls (SVG Fixed) -->
    <div class="grid grid-cols-3 gap-3">
        <div></div>
        <button id="up" class="control-btn">
            <svg viewBox="0 0 24 24">
                <path d="M12 3l-9 9h6v9h6v-9h6z" />
            </svg>
        </button>
        <div></div>
        <button id="left" class="control-btn">
            <svg viewBox="0 0 24 24">
                <path d="M3 12l9 9v-6h9v-6h-9v-6z" />
            </svg>
        </button>
        <button id="down" class="control-btn">
            <svg viewBox="0 0 24 24">
                <path d="M12 21l9-9h-6v-9h-6v9h-6z" />
            </svg>
        </button>
        <button id="right" class="control-btn">
            <svg viewBox="0 0 24 24">
                <path d="M21 12l-9-9v6h-9v6h9v6z" />
            </svg>
        </button>
    </div>

    <!-- Memory Modal -->
    <div id="modalOverlay" class="modal-overlay fixed inset-0">
        <div class="popup">
            <div
                class="w-full aspect-square bg-[#fff0f3] rounded-[2.5rem] mb-5 overflow-hidden border-2 border-[#ffe5ec] shadow-inner">
                <img id="modalImg" src="" class="w-full h-full object-cover">
            </div>
            <h2 id="modalTitle" class="text-xl font-bold text-[#fb6f92] mb-2"></h2>
            <p id="modalDesc" class="text-slate-500 text-xs mb-6 px-2"></p>
            <button id="closeBtn" class="puffy-button active:scale-95 transition-transform">
                ไปต่อเลยยย ❤️
            </button>
        </div>
    </div>

    <!-- Final Result -->
    <div id="finalScene"
        class="fixed inset-0 bg-white hidden flex-col items-center justify-center p-10 text-center z-[2000]">
        <div
            class="final-sticker relative w-40 h-40 mb-10 overflow-hidden rounded-full border-8 border-white shadow-2xl">
            <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&q=80&w=600"
                alt="Our Special Memory" class="w-full h-full object-cover">
        </div>
        <h2 class="text-3xl font-bold text-[#fb6f92] mb-4" style="line-height: 1.7;">Happy Anniversary 1 ปีนะคั้บบบ</h2>
        <p class="text-slate-400 mb-10 italic">"❤️ ขอบคุณมากนะบี๋ที่เกิดมาให้เค้ารักและเลือกเค้าในวันนั้นนะคั้บ
            และก็ขอบคุณตัวเองเหมือนกันที่ตัดสินใจทำให้มันมีจนถึงวันนี้ รูัสึกใช่ตั้งแต่เจอหน้าแล้วคั้บ ❤️"</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('modalOverlay');
        const statusText = document.getElementById('status');

        const charImg = new Image();
        charImg.src = 'https://cdn-icons-png.flaticon.com/512/4392/4392471.png';

        let gameState = {
            step: 0,
            isModalOpen: false,
            player: { x: 145, y: 280, size: 50, speed: 5, dx: 0, dy: 0 }
        };

        const checkpoints = [
            { x: 80, y: 220, t: "ความประทับใจแรก 🌷", d: "หน้าเหวี่ยง ตัวสูง แล้วยังคุยกับเค้าแบบถูกคอมาก ตอนนี้เป็นไง ถูกใจมั้ยล่ะ", i: "https://images.unsplash.com/photo-1518199266791-5375a83190b7", v: false },
            { x: 260, y: 140, t: "ที่พักใจของเค้า ☁️", d: "จริงๆนะเว้ยคือไม่ว่าเค้าจะเหนื่อยแค่ไหน แต่พอใช้เวลาด้วยกัน มันดีขึ้นแบบเว่ออะ", i: "https://images.unsplash.com/photo-1522673607200-1648832cee98", v: false },
            { x: 120, y: 50, t: "ของขวัญที่ดีที่สุด 🎁", d: "บี๋คือปัจจุบันและอนาคตของเค้าเลยคั้บบ เรามาไกลมากเลยคั้บ เค้าดีใจมากเลย เราจะอยู่ฉลองแบบนี้ไปทุกๆปีเลยนะ", i: "https://images.unsplash.com/photo-1494972308845-d171197eaa97", v: false }
        ];

        // Improved Controls
        const handleInput = (id, dx, dy) => {
            const el = document.getElementById(id);
            const start = (e) => { e.preventDefault(); if (!gameState.isModalOpen) { gameState.player.dx = dx; gameState.player.dy = dy; } };
            const stop = (e) => { e.preventDefault(); gameState.player.dx = 0; gameState.player.dy = 0; };
            el.addEventListener('touchstart', start);
            el.addEventListener('touchend', stop);
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', stop);
            el.addEventListener('mouseleave', stop);
        };

        handleInput('up', 0, -gameState.player.speed);
        handleInput('down', 0, gameState.player.speed);
        handleInput('left', -gameState.player.speed, 0);
        handleInput('right', gameState.player.speed, 0);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Path
            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = '#ffe4e6';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(170, 320);
            checkpoints.forEach((cp, i) => {
                if (i <= gameState.step) ctx.strokeStyle = '#fb6f92';
                ctx.lineTo(cp.x, cp.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cp.x, cp.y);
            });

            // Target Hearts
            checkpoints.forEach((cp, i) => {
                ctx.font = '32px serif';
                ctx.textAlign = 'center';
                if (cp.v) {
                    ctx.fillText('💖', cp.x, cp.y + 12);
                } else if (i === gameState.step) {
                    ctx.save();
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#fb6f92';
                    ctx.fillText('🤍', cp.x, cp.y + 12);
                    ctx.restore();
                } else {
                    ctx.globalAlpha = 0.3;
                    ctx.fillText('🔒', cp.x, cp.y + 12);
                    ctx.globalAlpha = 1.0;
                }
            });

            // Character
            const p = gameState.player;
            ctx.save();
            ctx.shadowBlur = 12;
            ctx.shadowColor = 'rgba(251, 111, 146, 0.25)';
            ctx.beginPath();
            ctx.arc(p.x + p.size / 2, p.y + p.size / 2, p.size / 2 + 3, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(p.x + p.size / 2, p.y + p.size / 2, p.size / 2, 0, Math.PI * 2);
            ctx.clip();
            ctx.drawImage(charImg, p.x, p.y, p.size, p.size);
            ctx.restore();
        }

        function update() {
            if (gameState.isModalOpen) return;
            const p = gameState.player;
            p.x += p.dx;
            p.y += p.dy;
            p.x = Math.max(10, Math.min(canvas.width - p.size - 10, p.x));
            p.y = Math.max(10, Math.min(canvas.height - p.size - 10, p.y));

            const target = checkpoints[gameState.step];
            if (target) {
                const d = Math.hypot(p.x + p.size / 2 - target.x, p.y + p.size / 2 - target.y);
                if (d < 30) {
                    target.v = true;
                    openModal(target);
                }
            }
        }

        function openModal(cp) {
            gameState.isModalOpen = true;
            gameState.player.dx = 0;
            gameState.player.dy = 0;
            document.getElementById('modalTitle').innerText = cp.t;
            document.getElementById('modalDesc').innerText = cp.d;
            document.getElementById('modalImg').src = cp.i;
            overlay.classList.add('active');
        }

        document.getElementById('closeBtn').onclick = () => {
            overlay.classList.remove('active');
            setTimeout(() => {
                gameState.isModalOpen = false;
                gameState.step++;
                if (gameState.step >= checkpoints.length) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    setTimeout(() => {
                        document.getElementById('finalScene').style.display = 'flex';
                    }, 500);
                } else {
                    statusText.innerText = `ด่านต่อไป: ${checkpoints[gameState.step].t}`;
                }
            }, 300);
        };

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>

    <script>
        document.addEventListener("click", () => {
            const bgm = document.getElementById("bgm");

            bgm.addEventListener("loadedmetadata", () => {
                bgm.currentTime = 1;
                bgm.muted = false;
                bgm.play();
            }, { once: true });

            bgm.load();
        }, { once: true });
    </script>
</body>

</html>
