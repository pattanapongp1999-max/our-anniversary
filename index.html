<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Love Journey | For Fah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; overflow: hidden; background: #fff1f2; touch-action: none; }
        .font-romantic { font-family: 'Great Vibes', cursive; }
        #game-canvas { background-color: #ffffff; border-radius: 1.5rem; width: 100%; height: auto; touch-action: none; }
        .checkpoint-modal { transform: translate(-50%, -50%) scale(0.9); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; opacity: 0; }
        .checkpoint-modal.active { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: all; }
        .d-pad button { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="flex flex-col items-center justify-start min-h-screen p-4">

    <div class="w-full max-w-md text-center mb-4 mt-2">
        <h1 class="text-4xl font-romantic text-rose-500">Our Love Journey</h1>
        <p class="text-slate-400 text-xs uppercase tracking-widest">พาเราสองคนไปเก็บหัวใจให้ครบนะ</p>
    </div>

    <div class="relative w-full max-w-md bg-white p-2 rounded-[2rem] shadow-xl">
        <canvas id="game-canvas" width="400" height="500"></canvas>
    </div>

    <div class="mt-6 grid grid-cols-3 gap-2 d-pad">
        <div></div>
        <button id="btn-up" class="w-16 h-16 bg-white shadow-lg rounded-2xl flex items-center justify-center text-2xl active:bg-rose-100">UP</button>
        <div></div>
        <button id="btn-left" class="w-16 h-16 bg-white shadow-lg rounded-2xl flex items-center justify-center text-2xl active:bg-rose-100">LT</button>
        <button id="btn-down" class="w-16 h-16 bg-white shadow-lg rounded-2xl flex items-center justify-center text-2xl active:bg-rose-100">DN</button>
        <button id="btn-right" class="w-16 h-16 bg-white shadow-lg rounded-2xl flex items-center justify-center text-2xl active:bg-rose-100">RT</button>
    </div>

    <div id="modal" class="checkpoint-modal fixed top-1/2 left-1/2 z-50 w-[85%] max-w-xs bg-white p-5 rounded-3xl shadow-2xl text-center">
        <div class="w-full h-40 bg-rose-50 rounded-2xl mb-4 overflow-hidden">
            <img id="modal-img" src="" class="w-full h-full object-cover">
        </div>
        <h3 id="modal-title" class="text-xl font-bold text-rose-500 mb-1"></h3>
        <p id="modal-text" class="text-sm text-slate-600 mb-4"></p>
        <button onclick="closeModal()" class="w-full py-3 bg-rose-500 text-white rounded-full font-bold shadow-lg active:scale-95 transition-transform">เดินทางต่อ ❤️</button>
    </div>

    <div id="final-overlay" class="fixed inset-0 bg-rose-500 z-[100] flex items-center justify-center flex-col text-white opacity-0 pointer-events-none transition-opacity duration-1000 p-8 text-center">
        <h2 class="text-5xl font-romantic mb-4">Happy Anniversary</h2>
        <p class="text-xl mb-8 font-light italic">"1 ปีที่ผ่านมาคือช่วงเวลาที่เค้ามีความสุขที่สุดเลย ขอบคุณนะฟ้า"</p>
        <button onclick="location.reload()" class="px-8 py-3 border-2 border-white rounded-full uppercase tracking-widest text-sm">Play Again</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        // --- 1. การตั้งค่ารูปภาพตัวละคร ---
        const playerImg = new Image();
        playerImg.src = 'https://i.imgur.com/your-image-url.png'; // เปลี่ยนเป็นลิงก์รูปคู่ของคุณ (แนะนำรูปสี่เหลี่ยมจตุรัส/วงกลม)
        // ถ้ายังไม่มีรูป ใช้ placeholder แทนก่อน
        if (playerImg.src.includes('your-image-url')) {
            playerImg.src = 'https://cdn-icons-png.flaticon.com/512/4392/4392471.png'; 
        }

        let player = { x: 180, y: 430, size: 45, speed: 4, dx: 0, dy: 0 };
        let checkpoints = [
            { x: 100, y: 350, title: "Our First Day", text: "วันแรกที่เราเริ่มเดินไปด้วยกัน...", img: "https://images.unsplash.com/photo-1518199266791-5375a83190b7", visited: false },
            { x: 300, y: 220, title: "Special Trip", text: "ทริปที่ทำให้เราได้รู้จักกันมากขึ้น", img: "https://images.unsplash.com/photo-1522673607200-1648832cee98", visited: false },
            { x: 150, y: 80, title: "1st Year Anniversary", text: "ถึงจะครบปีแล้ว แต่เค้าจะรักฟ้าเพิ่มขึ้นทุกวันนะ", img: "https://images.unsplash.com/photo-1494972308845-d171197eaa97", visited: false }
        ];

        // --- 2. ระบบควบคุมผ่านปุ่ม (Touch Controls) ---
        const setDir = (x, y) => { player.dx = x * player.speed; player.dy = y * player.speed; };
        const stopDir = () => { player.dx = 0; player.dy = 0; };

        const bindBtn = (id, x, y) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); setDir(x, y); });
            btn.addEventListener('touchend', stopDir);
            btn.addEventListener('mousedown', () => setDir(x, y));
            btn.addEventListener('mouseup', stopDir);
        };

        bindBtn('btn-up', 0, -1);
        bindBtn('btn-down', 0, 1);
        bindBtn('btn-left', -1, 0);
        bindBtn('btn-right', 1, 0);

        // Keyboard support
        window.addEventListener('keydown', e => {
            if(e.key === 'ArrowUp') setDir(0, -1);
            if(e.key === 'ArrowDown') setDir(0, 1);
            if(e.key === 'ArrowLeft') setDir(-1, 0);
            if(e.key === 'ArrowRight') setDir(1, 0);
        });
        window.addEventListener('keyup', stopDir);

        function update() {
            player.x += player.dx;
            player.y += player.dy;

            // Boundaries
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

            checkpoints.forEach(cp => {
                let dist = Math.hypot(player.x + player.size/2 - cp.x, player.y + player.size/2 - cp.y);
                if(dist < 30 && !cp.visited) {
                    cp.visited = true;
                    stopDir();
                    showModal(cp);
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Path
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(200, 450);
            checkpoints.forEach(cp => ctx.lineTo(cp.x, cp.y));
            ctx.strokeStyle = '#fda4af';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw Checkpoints
            checkpoints.forEach(cp => {
                ctx.font = '24px serif';
                ctx.fillText(cp.visited ? '💖' : '🤍', cp.x - 12, cp.y + 8);
            });

            // Draw Character (Image)
            // วาดวงกลมสีขาวรองพื้นเพื่อให้รูปดูเด่น
            ctx.beginPath();
            ctx.arc(player.x + player.size/2, player.y + player.size/2, player.size/2 + 2, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            
            // วาดรูปตัวละคร
            ctx.save();
            ctx.beginPath();
            ctx.arc(player.x + player.size/2, player.y + player.size/2, player.size/2, 0, Math.PI*2);
            ctx.clip();
            ctx.drawImage(playerImg, player.x, player.y, player.size, player.size);
            ctx.restore();
        }

        function loop() {
            if(!document.getElementById('modal').classList.contains('active')) update();
            draw();
            requestAnimationFrame(loop);
        }

        function showModal(cp) {
            document.getElementById('modal-title').innerText = cp.title;
            document.getElementById('modal-text').innerText = cp.text;
            document.getElementById('modal-img').src = cp.img;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            if(checkpoints.every(cp => cp.visited)) {
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
                setTimeout(() => {
                    document.getElementById('final-overlay').classList.add('opacity-100', 'pointer-events-all');
                }, 1000);
            }
        }

        loop();
    </script>
</body>
</html>
