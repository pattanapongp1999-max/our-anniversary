<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Love Journey | Console Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&family=Mali:wght@500&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            overflow: hidden; 
            background: #ffe4e6; 
            touch-action: none;
        }
        .font-mali { font-family: 'Mali', cursive; }
        
        /* สไตล์หน้าจอเกม */
        #game-screen {
            background: #fff;
            border: 8px solid #fb7185;
            border-radius: 2rem;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
        }

        /* แผงควบคุมจอยเกม */
        .controller-pad {
            background: #f43f5e;
            border-radius: 2.5rem 2.5rem 0 0;
            padding: 2rem 1rem;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }

        .btn-control {
            background: #fff;
            color: #f43f5e;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 5px 0 #fb7185;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-control:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #fb7185;
        }

        /* Modal Popup */
        .modal-container {
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            pointer-events: none;
        }
        .modal-container.active {
            transform: scale(1);
            opacity: 1;
            pointer-events: all;
        }

        /* ตัวละครเดินดุ๊กดิ๊ก */
        @keyframes waddle {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }
        .waddle-animation {
            animation: waddle 0.3s ease-in-out infinite alternate;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- ส่วนที่ 1: หน้าจอแสดงผล (ครึ่งบน) -->
    <div class="flex-grow flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-md text-center mb-4">
            <h1 class="text-3xl font-mali text-rose-600">Our Anniversary Path</h1>
            <p id="guide" class="text-rose-400 text-sm">❤️ เก็บหัวใจดวงที่ 1 กันเถอะ</p>
        </div>

        <div id="game-screen" class="w-full max-w-sm aspect-[4/5] overflow-hidden">
            <canvas id="gameCanvas" width="400" height="500" class="w-full h-full"></canvas>
        </div>
    </div>

    <!-- ส่วนที่ 2: แผงควบคุม (ยกขึ้นมาให้กดง่าย) -->
    <div class="controller-pad w-full flex flex-col items-center">
        <div class="grid grid-cols-3 gap-3">
            <div></div>
            <button id="up" class="btn-control w-14 h-14">▲</button>
            <div></div>
            <button id="left" class="btn-control w-14 h-14">◀</button>
            <button id="down" class="btn-control w-14 h-14">▼</button>
            <button id="right" class="btn-control w-14 h-14">▶</button>
        </div>
        <div class="mt-4 text-white/50 text-xs font-light">Play with Love by Your BF</div>
    </div>

    <!-- Story Modal -->
    <div id="modal" class="modal-container fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-6 text-center border-4 border-rose-100 shadow-2xl">
            <div class="w-full aspect-square bg-rose-50 rounded-3xl mb-4 overflow-hidden shadow-inner">
                <img id="mImg" src="" class="w-full h-full object-cover">
            </div>
            <h3 id="mTitle" class="text-xl font-bold text-rose-600 mb-2"></h3>
            <p id="mText" class="text-slate-500 text-sm leading-relaxed mb-6"></p>
            <button onclick="closeModal()" class="w-full py-4 bg-rose-500 text-white rounded-2xl font-bold text-lg active:scale-95 transition-transform">
                เดินทางต่อ
            </button>
        </div>
    </div>

    <!-- Final Surprise -->
    <div id="final" class="fixed inset-0 z-[100] bg-rose-500 flex flex-col items-center justify-center p-10 text-center opacity-0 pointer-events-none transition-opacity duration-1000">
        <div class="text-6xl mb-6 animate-bounce">🎁</div>
        <h2 class="text-4xl font-mali text-white mb-4">Happy 1st Year Anniversary!</h2>
        <p class="text-white/80 font-light mb-10 leading-relaxed italic">
            "ขอบคุณที่เดินเคียงข้างกันมาตลอด 1 ปีนะจ๊ะฟ้า เค้าจะรักและดูแลฟ้าให้ดีที่สุดตลอดไป"
        </p>
        <button onclick="location.reload()" class="px-10 py-3 bg-white text-rose-500 rounded-full font-bold shadow-xl">เล่นอีกรอบ ❤️</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guide');

        // --- ตั้งค่ารูปตัวละคร ---
        const charImg = new Image();
        charImg.src = 'https://cdn-icons-png.flaticon.com/512/4392/4392471.png'; // เปลี่ยนเป็นรูปของคุณ

        let currentStep = 0;
        let player = { x: 180, y: 420, size: 45, speed: 4, dx: 0, dy: 0, moving: false };
        
        const checkpoints = [
            { x: 100, y: 340, t: "จุดเริ่มต้น (Day 1)", d: "วันแรกที่เราเริ่มคุยกัน เค้าจำได้ทุกลายละเอียดเลยนะ ขอบคุณที่เปิดใจให้กัน", i: "https://images.unsplash.com/photo-1518199266791-5375a83190b7", v: false },
            { x: 300, y: 220, t: "ความทรงจำแสนพิเศษ", d: "ทริปที่เราไปด้วยกัน มันคือช่วงเวลาที่เค้ามีความสุขที่สุดเลย อยากไปเที่ยวกับฟ้าอีกบ่อยๆ นะ", i: "https://images.unsplash.com/photo-1522673607200-1648832cee98", v: false },
            { x: 150, y: 100, t: "ครบรอบ 1 ปีแล้วนะ", d: "ขอบคุณที่เป็นแฟนที่น่ารักที่สุดในโลก รักฟ้าที่สุดเลยยย", i: "https://images.unsplash.com/photo-1494972308845-d171197eaa97", v: false }
        ];

        // Controls
        const control = (id, x, y) => {
            const btn = document.getElementById(id);
            const start = (e) => { e.preventDefault(); player.dx = x * player.speed; player.dy = y * player.speed; player.moving = true; };
            const stop = () => { player.dx = 0; player.dy = 0; player.moving = false; };
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', stop);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', stop);
        };
        control('up', 0, -1); control('down', 0, 1); control('left', -1, 0); control('right', 1, 0);

        function update() {
            player.x += player.dx; player.y += player.dy;
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

            const target = checkpoints[currentStep];
            if(target) {
                const dist = Math.hypot(player.x + player.size/2 - target.x, player.y + player.size/2 - target.y);
                if(dist < 30) {
                    target.v = true;
                    player.dx = 0; player.dy = 0; player.moving = false;
                    openModal(target);
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // วาดเส้นทาง
            ctx.setLineDash([10, 10]);
            ctx.strokeStyle = '#fecdd3';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(200, 480);
            checkpoints.forEach((cp, idx) => {
                if(idx <= currentStep) ctx.strokeStyle = '#fb7185';
                ctx.lineTo(cp.x, cp.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cp.x, cp.y);
            });

            // วาดจุดหัวใจ
            checkpoints.forEach((cp, idx) => {
                ctx.font = '30px serif';
                ctx.textAlign = 'center';
                if(cp.v) ctx.fillText('💖', cp.x, cp.y + 10);
                else if(idx === currentStep) ctx.fillText('🤍', cp.x, cp.y + 10);
                else {
                    ctx.globalAlpha = 0.3;
                    ctx.fillText('🔒', cp.x, cp.y + 10);
                    ctx.globalAlpha = 1;
                }
            });

            // วาดตัวละคร
            ctx.save();
            if(player.moving) {
                // เอฟเฟกต์เดินดุ๊กดิ๊ก
                ctx.translate(player.x + player.size/2, player.y + player.size/2);
                ctx.rotate(Math.sin(Date.now() / 100) * 0.1);
                ctx.translate(-(player.x + player.size/2), -(player.y + player.size/2));
            }
            
            // ขอบขาวสติ๊กเกอร์
            ctx.beginPath();
            ctx.arc(player.x + player.size/2, player.y + player.size/2, player.size/2 + 4, 0, Math.PI*2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(player.x + player.size/2, player.y + player.size/2, player.size/2, 0, Math.PI*2);
            ctx.clip();
            ctx.drawImage(charImg, player.x, player.y, player.size, player.size);
            ctx.restore();
        }

        function openModal(cp) {
            document.getElementById('mTitle').innerText = cp.t;
            document.getElementById('mText').innerText = cp.d;
            document.getElementById('mImg').src = cp.i;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentStep++;
            if(currentStep >= checkpoints.length) {
                triggerFinal();
            } else {
                guide.innerText = `❤️ เก็บหัวใจดวงที่ ${currentStep + 1} กันต่อเลย`;
            }
        }

        function triggerFinal() {
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.7 } });
            setTimeout(() => {
                document.getElementById('final').classList.add('opacity-100', 'pointer-events-all');
            }, 1000);
        }

        function loop() {
            if(!document.getElementById('modal').classList.contains('active')) update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
