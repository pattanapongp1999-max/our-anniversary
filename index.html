<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Journey | 1st Anniversary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; overflow: hidden; background: #fdf2f8; }
        .font-romantic { font-family: 'Dancing Script', cursive; }
        #game-canvas { background-color: #ffffff; border-radius: 2rem; box-shadow: 0 20px 50px rgba(251, 113, 133, 0.2); }
        .checkpoint-modal { transform: translate(-50%, -50%) scale(0.9); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .checkpoint-modal.active { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: all; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="relative w-full max-w-4xl bg-white p-4 rounded-[2.5rem] shadow-2xl">
        <div class="absolute top-8 left-1/2 -translate-x-1/2 z-10 text-center w-full">
            <h1 class="text-3xl md:text-5xl font-romantic text-rose-500">Our Love Journey</h1>
            <p class="text-slate-400 text-sm mt-1 uppercase tracking-widest">เดินไปเก็บหัวใจให้ครบเพื่อรับ Surprise นะฟ้า</p>
        </div>

        <canvas id="game-canvas" width="800" height="500" class="w-full h-auto"></canvas>

        <div class="mt-4 grid grid-cols-3 gap-2 w-32 mx-auto md:hidden">
            <div></div>
            <button onmousedown="move('up')" onmouseup="stop()" class="p-4 bg-rose-100 rounded-xl text-rose-500">↑</button>
            <div></div>
            <button onmousedown="move('left')" onmouseup="stop()" class="p-4 bg-rose-100 rounded-xl text-rose-500">←</button>
            <button onmousedown="move('down')" onmouseup="stop()" class="p-4 bg-rose-100 rounded-xl text-rose-500">↓</button>
            <button onmousedown="move('right')" onmouseup="stop()" class="p-4 bg-rose-100 rounded-xl text-rose-500">→</button>
        </div>
    </div>

    <div id="modal" class="checkpoint-modal fixed top-1/2 left-1/2 opacity-0 pointer-events-none z-50 w-[90%] max-w-md bg-white p-6 rounded-3xl shadow-2xl text-center">
        <div id="modal-img" class="w-full h-48 bg-rose-100 rounded-2xl mb-4 overflow-hidden">
            <img src="" class="w-full h-full object-cover">
        </div>
        <h3 id="modal-title" class="text-2xl font-bold text-rose-500 mb-2"></h3>
        <p id="modal-text" class="text-slate-600 mb-6"></p>
        <button onclick="closeModal()" class="w-full py-3 bg-rose-500 text-white rounded-full font-bold shadow-lg">เดินทางต่อ ❤️</button>
    </div>

    <div id="final-overlay" class="fixed inset-0 bg-rose-500 z-[100] flex items-center justify-center flex-col text-white opacity-0 pointer-events-none transition-opacity duration-1000">
        <h2 class="text-7xl font-romantic mb-4">Happy 1st Anniversary</h2>
        <p class="text-2xl mb-8">ขอบคุณที่เป็น Partner ที่ดีที่สุดของเค้านะคะ</p>
        <button onclick="location.reload()" class="px-10 py-3 border-2 border-white rounded-full">เริ่มเดินทางใหม่อีกครั้ง</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('modal');

        // Game State
        let player = { x: 50, y: 400, size: 30, speed: 5, dx: 0, dy: 0 };
        let checkpoints = [
            { x: 150, y: 350, title: "จุดเริ่มต้นของเรา", text: "วันแรกที่เราเริ่มคุยกัน จำได้ไหมว่าเค้าเขินแค่ไหน", img: "https://images.unsplash.com/photo-1518199266791-5375a83190b7", visited: false },
            { x: 400, y: 200, title: "ทริปแรกที่แสนพิเศษ", text: "การไปเที่ยวด้วยกันครั้งแรก ทำให้เค้ารู้ว่าชีวิตที่มีฟ้ามันดีกว่าเยอะเลย", img: "https://images.unsplash.com/photo-1522673607200-1648832cee98", visited: false },
            { x: 650, y: 100, title: "1 ปีที่มีความสุข", text: "ขอบคุณที่อดทนและเติบโตไปด้วยกันนะ รักฟ้าที่สุดเลย", img: "https://images.unsplash.com/photo-1494972308845-d171197eaa97", visited: false }
        ];

        // Controls Logic
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowUp') player.dy = -player.speed;
            if(e.key === 'ArrowDown') player.dy = player.speed;
            if(e.key === 'ArrowLeft') player.dx = -player.speed;
            if(e.key === 'ArrowRight') player.dx = player.speed;
        });

        window.addEventListener('keyup', () => { player.dx = 0; player.dy = 0; });

        function move(dir) {
            if(dir === 'up') player.dy = -player.speed;
            if(dir === 'down') player.dy = player.speed;
            if(dir === 'left') player.dx = -player.speed;
            if(dir === 'right') player.dx = player.speed;
        }
        function stop() { player.dx = 0; player.dy = 0; }

        function update() {
            player.x += player.dx;
            player.y += player.dy;

            // Boundaries
            if(player.x < 0) player.x = 0;
            if(player.x + player.size > canvas.width) player.x = canvas.width - player.size;
            if(player.y < 0) player.y = 0;
            if(player.y + player.size > canvas.height) player.y = canvas.height - player.size;

            // Check Collision
            checkpoints.forEach((cp, index) => {
                let dist = Math.hypot(player.x - cp.x, player.y - cp.y);
                if(dist < 40 && !cp.visited) {
                    cp.visited = true;
                    showModal(cp);
                    player.dx = 0; player.dy = 0;
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Path (Dotted Line)
            ctx.beginPath();
            ctx.setLineDash([10, 10]);
            ctx.moveTo(50, 400);
            checkpoints.forEach(cp => ctx.lineTo(cp.x, cp.y));
            ctx.strokeStyle = '#fecdd3';
            ctx.stroke();

            // Draw Checkpoints
            checkpoints.forEach(cp => {
                ctx.font = '30px serif';
                ctx.fillText(cp.visited ? '💖' : '🤍', cp.x - 15, cp.y + 10);
            });

            // Draw Player (Character)
            ctx.font = '40px serif';
            ctx.fillText('👦', player.x, player.y + 30);
            // ถ้าอยากให้มีตัวละครฟ้าเดินคู่กัน
            ctx.fillText('👧', player.x - 20, player.y + 15);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function showModal(cp) {
            document.getElementById('modal-title').innerText = cp.title;
            document.getElementById('modal-text').innerText = cp.text;
            document.getElementById('modal-img').querySelector('img').src = cp.img;
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            if(checkpoints.every(cp => cp.visited)) {
                triggerFinal();
            }
        }

        function triggerFinal() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => {
                const final = document.getElementById('final-overlay');
                final.classList.remove('opacity-0', 'pointer-events-none');
                final.classList.add('opacity-100');
            }, 1000);
        }

        loop();
    </script>
</body>
</html>
