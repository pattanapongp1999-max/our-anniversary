<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibrant Love Journey | For Fah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&family=Mali:wght@600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            overflow: hidden; 
            background: #fff1f2; 
            touch-action: none; 
            background-image: 
                radial-gradient(#fda4af 1.2px, transparent 1.2px),
                radial-gradient(#fda4af 1.2px, #fff1f2 1.2px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
        }
        .font-handwriting { font-family: 'Mali', cursive; }
        
        #game-container {
            position: relative;
            background: white;
            border: 6px solid #fb7185;
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px rgba(251, 113, 133, 0.2);
            overflow: hidden;
        }

        #game-canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .d-pad button {
            background: white;
            color: #e11d48;
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 6px 0 #fb7185;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .d-pad button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #fb7185;
        }

        .modal-active {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            from { opacity: 0; transform: translate(-50%, -45%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* เอฟเฟกต์แสงวิ้งๆ บนรูป */
        .img-container::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4">

    <!-- Header Section -->
    <div class="w-full max-w-md text-center mt-2 mb-4">
        <h1 class="text-4xl font-handwriting text-rose-600 drop-shadow-sm">Our Love Trail</h1>
        <div id="guide-banner" class="mt-2 glass-panel px-6 py-1.5 rounded-full inline-block border-2 border-rose-100">
            <span class="text-rose-500 font-bold text-sm">📍 เป้าหมาย: หัวใจดวงที่ 1</span>
        </div>
    </div>

    <!-- Main Game Frame -->
    <div id="game-container" class="w-full max-w-[360px]">
        <canvas id="game-canvas" width="400" height="420"></canvas>
    </div>

    <!-- Controls Section -->
    <div class="flex-grow flex items-center justify-center w-full max-w-md">
        <div class="grid grid-cols-3 gap-4 d-pad">
            <div></div>
            <button id="btn-up" class="w-16 h-16">▲</button>
            <div></div>
            <button id="btn-left" class="w-16 h-16">◀</button>
            <button id="btn-down" class="w-16 h-16">▼</button>
            <button id="btn-right" class="w-16 h-16">▶</button>
        </div>
    </div>

    <!-- Hidden Modals & Overlays -->
    <div id="modal" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[200] w-[90%] max-w-xs bg-white p-5 rounded-[2.5rem] shadow-[0_25px_60px_-15px_rgba(0,0,0,0.3)] text-center border-[6px] border-rose-50 opacity-0 pointer-events-none transition-all duration-300">
        <div class="img-container relative w-full aspect-[4/3] bg-rose-100 rounded-[1.8rem] mb-4 overflow-hidden shadow-inner border-2 border-rose-50">
            <img id="mImg" src="" class="w-full h-full object-cover">
        </div>
        <h3 id="mTitle" class="text-xl font-bold text-rose-600 mb-1"></h3>
        <p id="mText" class="text-sm text-slate-600 leading-relaxed mb-6 px-2"></p>
        <button onclick="closeModal()" class="w-full py-4 bg-rose-600 text-white rounded-2xl font-bold text-lg shadow-lg shadow-rose-200 active:scale-95 transition-transform">
            รักจัง เดินต่อเลย ❤️
        </button>
    </div>

    <div id="finish" class="fixed inset-0 bg-rose-600 z-[300] flex flex-col items-center justify-center p-8 text-center text-white opacity-0 pointer-events-none transition-opacity duration-1000">
        <div class="w-32 h-32 bg-white rounded-full flex items-center justify-center text-6xl mb-6 shadow-2xl animate-bounce">💝</div>
        <h2 class="text-5xl font-handwriting mb-4">Forever Yours</h2>
        <p class="text-lg opacity-90 mb-10 font-light italic">"1 ปีที่ผ่านมาคือของขวัญที่ดีที่สุดของเค้าเลยนะฟ้า"</p>
        <button onclick="location.reload()" class="px-12 py-4 bg-white text-rose-600 rounded-full font-bold text-lg shadow-xl uppercase tracking-widest">Replay</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const guide = document.getElementById('guide-banner');

        // Character Setup
        const pImg = new Image();
        pImg.src = 'https://cdn-icons-png.flaticon.com/512/4392/4392471.png'; // ใส่รูปของคุณได้ที่นี่

        let step = 0;
        let player = { x: 175, y: 340, size: 55, speed: 5, dx: 0, dy: 0 };
        
        const checkpoints = [
            { x: 80, y: 280, t: "จุดเริ่มต้นที่สดใส", d: "จำวันแรกที่เราคุยกันได้ไหม โลกทั้งใบกลายเป็นสีชมพูเลยนะ", i: "https://images.unsplash.com/photo-1518199266791-5375a83190b7", v: false },
            { x: 320, y: 180, t: "เดทแรกของเรา", d: "เค้าตื่นเต้นมาก แต่พอได้เห็นหน้าฟ้า ทุกอย่างก็ดูสมบูรณ์แบบไปหมด", i: "https://images.unsplash.com/photo-1522673607200-1648832cee98", v: false },
            { x: 100, y: 80, t: "1 ปีแห่งความสุข", d: "ขอบคุณที่อยู่เคียงข้างกันนะ สัญญาว่าจะรักให้ดีขึ้นทุกวันเลย", i: "https://images.unsplash.com/photo-1494972308845-d171197eaa97", v: false }
        ];

        // High Quality Drawing Functions
        function drawBackground() {
            // Draw Main Path (Glow Effect)
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(251, 113, 133, 0.4)';
            ctx.setLineDash([12, 12]);
            ctx.strokeStyle = '#ffe4e6';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(200, 380);
            checkpoints.forEach((cp, idx) => {
                if(idx <= step) ctx.strokeStyle = '#fb7185';
                ctx.lineTo(cp.x, cp.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cp.x, cp.y);
            });
            ctx.shadowBlur = 0;
        }

        function drawHearts() {
            checkpoints.forEach((cp, idx) => {
                ctx.textAlign = 'center';
                
                // Heart Shadow
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                
                if (cp.v) {
                    ctx.font = '32px serif';
                    ctx.fillText('💖', cp.x, cp.y + 12);
                } else if (idx === step) {
                    // Active Target
                    ctx.beginPath();
                    ctx.arc(cp.x, cp.y, 25, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(251, 113, 133, 0.15)';
                    ctx.fill();
                    ctx.strokeStyle = '#fb7185';
                    ctx.setLineDash([]);
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.font = '32px serif';
                    ctx.fillText('🤍', cp.x, cp.y + 12);
                } else {
                    ctx.globalAlpha = 0.4;
                    ctx.font = '24px serif';
                    ctx.fillText('🔒', cp.x, cp.y + 10);
                    ctx.globalAlpha = 1.0;
                }
                ctx.shadowBlur = 0;

                ctx.font = 'bold 12px Prompt';
                ctx.fillStyle = '#f43f5e';
                ctx.fillText(`Step ${idx + 1}`, cp.x, cp.y + 35);
            });
        }

        function drawPlayer() {
            const centerX = player.x + player.size/2;
            const centerY = player.y + player.size/2;

            // Sticker Border (Glossy White)
            ctx.beginPath();
            ctx.arc(centerX, centerY, player.size/2 + 5, 0, Math.PI*2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(225, 29, 72, 0.2)';
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Image Character
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, player.size/2, 0, Math.PI*2);
            ctx.clip();
            ctx.drawImage(pImg, player.x, player.y, player.size, player.size);
            ctx.restore();

            // Reflection on sticker
            ctx.beginPath();
            ctx.arc(centerX, centerY, player.size/2, -Math.PI/4, -Math.PI*3/4, true);
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // Gameplay Logic
        const control = (id, x, y) => {
            const b = document.getElementById(id);
            const move = (e) => { e.preventDefault(); player.dx = x * player.speed; player.dy = y * player.speed; };
            const stop = (e) => { e.preventDefault(); player.dx = 0; player.dy = 0; };
            b.addEventListener('touchstart', move);
            b.addEventListener('touchend', stop);
            b.addEventListener('mousedown', move);
            b.addEventListener('mouseup', stop);
        };
        control('btn-up', 0, -1); control('btn-down', 0, 1); control('btn-left', -1, 0); control('btn-right', 1, 0);

        function update() {
            player.x += player.dx; player.y += player.dy;
            player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

            const target = checkpoints[step];
            if(target) {
                const d = Math.hypot(player.x + player.size/2 - target.x, player.y + player.size/2 - target.y);
                if(d < 30) {
                    target.v = true;
                    player.dx = 0; player.dy = 0;
                    openModal(target);
                }
            }
        }

        function openModal(cp) {
            document.getElementById('mTitle').innerText = cp.t;
            document.getElementById('mText').innerText = cp.d;
            document.getElementById('mImg').src = cp.i;
            const m = document.getElementById('modal');
            m.classList.add('opacity-100', 'pointer-events-all', 'modal-active');
        }

        function closeModal() {
            const m = document.getElementById('modal');
            m.classList.remove('opacity-100', 'pointer-events-all', 'modal-active');
            step++;
            if(step < checkpoints.length) {
                guide.innerHTML = `<span class="text-rose-500 font-bold text-sm">📍 เป้าหมาย: หัวใจดวงที่ ${step + 1}</span>`;
            } else {
                guide.innerText = "สำเร็จแล้ว! 🎉";
                confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
                setTimeout(() => document.getElementById('finish').classList.add('opacity-100', 'pointer-events-all'), 1200);
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawHearts();
            drawPlayer();
            if(!document.getElementById('modal').classList.contains('opacity-100')) update();
            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
