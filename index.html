<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anniversary 1st of Max & Fah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff8fa3;
            --secondary: #ffb3c1;
            --accent: #fb6f92;
        }
        body { 
            font-family: 'Mali', cursive; 
            background-color: #fff0f3;
            background-image: 
                radial-gradient(#ffc2d1 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            overflow: hidden;
            touch-action: none;
        }

        .game-frame {
            background: white;
            border: 6px solid #fff;
            border-radius: 3.5rem;
            box-shadow: 
                0 15px 40px rgba(251, 111, 146, 0.25),
                inset 0 0 20px rgba(255, 143, 163, 0.05);
            position: relative;
        }

        canvas {
            display: block;
            border-radius: 3rem;
            background: linear-gradient(to bottom, #ffffff, #fffafa);
        }

        /* ปุ่มควบคุมแบบ SVG */
        .control-btn {
            background: white;
            border-radius: 1.2rem;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #ffb3c1;
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding: 12px;
        }
        .control-btn svg {
            width: 100%;
            height: 100%;
            fill: #fb6f92;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
        }
        .control-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #ffb3c1;
            background-color: #fff9fa;
        }

        .modal-overlay {
            background: rgba(45, 15, 25, 0.2);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .popup {
            background: white;
            border-radius: 2.5rem;
            width: 100%;
            max-width: 340px;
            padding: 1.2rem;
            text-align: center;
            border: 4px solid #fff;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .popup { 
            transform: translateY(0); 
            opacity: 1;
        }

        .puffy-button {
            background: linear-gradient(135deg, #ff8fa3, #fb6f92);
            color: white;
            border-radius: 1.5rem;
            padding: 1.1rem;
            width: 100%;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 8px 20px rgba(251, 111, 146, 0.3);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .glow-heart {
            filter: drop-shadow(0 0 8px rgba(251, 111, 146, 0.6));
        }
    </style>
</head>
<body class="flex flex-col items-center justify-between min-h-screen p-4 py-6">

    <!-- ส่วนหัว -->
    <div class="text-center">
        <h1 class="text-3xl font-bold text-[#fb6f92] drop-shadow-sm">Our Adventure 🎀</h1>
        <div id="status" class="bg-white/90 px-5 py-1.5 rounded-full text-xs text-[#ff8fa3] font-bold border border-rose-100 mt-2 shadow-sm inline-block">
            Step 1: จุดเริ่มต้น
        </div>
    </div>

    <!-- หน้าจอเกม -->
    <div class="game-frame w-full max-w-[340px] border-8">
        <canvas id="gameCanvas" width="340" height="380"></canvas>
    </div>

    <!-- ปุ่มควบคุม (ใช้ SVG แทนลูกศร) -->
    <div class="grid grid-cols-3 gap-3 mb-2">
        <div></div>
        <div id="up" class="control-btn">
            <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg>
        </div>
        <div></div>
        <div id="left" class="control-btn">
            <svg viewBox="0 0 24 24"><path d="M4 12l8 8v-5h8v-6h-8v-5z"/></svg>
        </div>
        <div id="down" class="control-btn">
            <svg viewBox="0 0 24 24"><path d="M12 20l8-8h-5v-8h-6v8h-5z"/></svg>
        </div>
        <div id="right" class="control-btn">
            <svg viewBox="0 0 24 24"><path d="M20 12l-8-8v5h-8v-6h8v-5z"/></svg>
        </div>
    </div>

    <!-- ระบบ Modal -->
    <div id="modalOverlay" class="modal-overlay fixed inset-0">
        <div class="popup">
            <div class="w-full aspect-[4/3] bg-[#fff0f3] rounded-3xl mb-5 overflow-hidden border-2 border-[#ffe5ec] relative shadow-inner">
                <img id="modalImg" src="" class="w-full h-full object-cover">
            </div>
            <h2 id="modalTitle" class="text-xl font-bold text-[#fb6f92] mb-2"></h2>
            <p id="modalDesc" class="text-slate-500 text-sm mb-6 leading-relaxed px-2"></p>
            <button id="closeBtn" class="puffy-button active:scale-95 transition-transform">
                รักจัง เดินต่อเลย ❤️
            </button>
        </div>
    </div>

    <!-- ฉากจบ -->
    <div id="finalScene" class="fixed inset-0 bg-[#fb6f92] hidden flex-col items-center justify-center p-10 text-center z-[2000]">
        <div class="text-8xl mb-6 animate-bounce">💝</div>
        <h2 class="text-4xl font-bold text-white mb-4">Happy 1st Year!</h2>
        <p class="text-white/90 mb-10 italic font-light">"ขอบคุณที่เดินมาถึงตรงนี้ และขอบคุณที่อยู่ด้วยกันมาตลอดนะฟ้า"</p>
        <button onclick="location.reload()" class="bg-white text-[#fb6f92] px-10 py-4 rounded-full font-bold shadow-2xl">Restart the Love ☁️</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('modalOverlay');
        const statusText = document.getElementById('status');

        const charImg = new Image();
        charImg.src = 'https://cdn-icons-png.flaticon.com/512/4392/4392471.png';

        let gameState = {
            step: 0,
            isModalOpen: false,
            player: { x: 145, y: 300, size: 50, speed: 5.5, dx: 0, dy: 0 }
        };

        const checkpoints = [
            { x: 70, y: 240, t: "จุดเริ่มต้น 💌", d: "วันแรกที่คุยกัน ใครจะคิดว่าเราจะมาไกลขนาดนี้ ขอบคุณที่เปิดใจให้เค้านะ", i: "https://images.unsplash.com/photo-1518199266791-5375a83190b7", v: false },
            { x: 270, y: 160, t: "คนพิเศษ 🌸", d: "ฟ้าเป็นคนที่น่ารักที่สุดในโลกสำหรับเค้า ไม่ว่าวันไหนฟ้าก็ทำให้เค้ายิ้มได้เสมอ", i: "https://images.unsplash.com/photo-1522673607200-1648832cee98", v: false },
            { x: 100, y: 70, t: "ความรัก 1 ปี 🎂", d: "หนึ่งปีที่ผ่านมามันมหัศจรรย์มาก เค้าสัญญาว่าจะรักและดูแลฟ้าให้ดีที่สุดเลยนะ", i: "https://images.unsplash.com/photo-1494972308845-d171197eaa97", v: false }
        ];

        // ระบบควบคุม
        const setupBtn = (id, dx, dy) => {
            const btn = document.getElementById(id);
            const start = (e) => { 
                e.preventDefault(); 
                if(!gameState.isModalOpen) { 
                    gameState.player.dx = dx; 
                    gameState.player.dy = dy; 
                } 
            };
            const stop = (e) => { 
                e.preventDefault(); 
                gameState.player.dx = 0; 
                gameState.player.dy = 0; 
            };
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', stop);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', stop);
            btn.addEventListener('mouseleave', stop);
        };

        setupBtn('up', 0, -gameState.player.speed);
        setupBtn('down', 0, gameState.player.speed);
        setupBtn('left', -gameState.player.speed, 0);
        setupBtn('right', gameState.player.speed, 0);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // วาดเส้นทาง
            ctx.setLineDash([8, 8]);
            ctx.strokeStyle = '#ffe5ec';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(170, 350);
            checkpoints.forEach((cp, i) => {
                if(i <= gameState.step) ctx.strokeStyle = '#fb6f92';
                ctx.lineTo(cp.x, cp.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(cp.x, cp.y);
            });

            // วาดหัวใจ
            checkpoints.forEach((cp, i) => {
                ctx.font = '32px serif';
                ctx.textAlign = 'center';
                if(cp.v) {
                    ctx.fillText('💖', cp.x, cp.y + 12);
                } else if(i === gameState.step) {
                    ctx.save();
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#fb6f92';
                    ctx.fillText('🤍', cp.x, cp.y + 12);
                    ctx.restore();
                } else {
                    ctx.globalAlpha = 0.2;
                    ctx.fillText('🔒', cp.x, cp.y + 12);
                    ctx.globalAlpha = 1.0;
                }
            });

            // วาดตัวละคร
            const p = gameState.player;
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(251, 111, 146, 0.4)';
            ctx.beginPath();
            ctx.arc(p.x + p.size/2, p.y + p.size/2, p.size/2 + 4, 0, Math.PI*2);
            ctx.fillStyle = 'white';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(p.x + p.size/2, p.y + p.size/2, p.size/2, 0, Math.PI*2);
            ctx.clip();
            ctx.drawImage(charImg, p.x, p.y, p.size, p.size);
            ctx.restore();
        }

        function update() {
            if(gameState.isModalOpen) return;

            const p = gameState.player;
            p.x += p.dx;
            p.y += p.dy;

            p.x = Math.max(10, Math.min(canvas.width - p.size - 10, p.x));
            p.y = Math.max(10, Math.min(canvas.height - p.size - 10, p.y));

            const target = checkpoints[gameState.step];
            if(target) {
                const dist = Math.hypot(p.x + p.size/2 - target.x, p.y + p.size/2 - target.y);
                if(dist < 32) {
                    target.v = true;
                    openModal(target);
                }
            }
        }

        function openModal(cp) {
            gameState.isModalOpen = true;
            gameState.player.dx = 0;
            gameState.player.dy = 0;
            document.getElementById('modalTitle').innerText = cp.t;
            document.getElementById('modalDesc').innerText = cp.d;
            document.getElementById('modalImg').src = cp.i;
            overlay.classList.add('active');
        }

        document.getElementById('closeBtn').onclick = function() {
            overlay.classList.remove('active');
            // หน่วงเวลาเล็กน้อยเพื่อให้ Animation การปิดดูนุ่มนวล
            setTimeout(() => {
                gameState.isModalOpen = false;
                gameState.step++;
                
                if(gameState.step >= checkpoints.length) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    setTimeout(() => {
                        document.getElementById('finalScene').style.display = 'flex';
                    }, 800);
                } else {
                    statusText.innerText = `Step ${gameState.step + 1}: ${checkpoints[gameState.step].t}`;
                }
            }, 100);
        };

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
